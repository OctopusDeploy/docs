name: Build and deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      node_version: ${{ steps.read.outputs.NODE_VERSION }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: cat .github/versions.env >> "$GITHUB_OUTPUT"

  branch_validation:
    needs: versions
    uses: OctopusDeploy/microsite-deployment/.github/workflows/microsite-deployment-full.yml@main
    with:
      octopus_project_name: 'Docs Microsite'
      package_id: 'DocsMicrosite'
      node_version: ${{ needs.versions.outputs.node_version }}
    secrets: inherit
